---
name: build-android

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+.android'
      - '[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+.android'

env:
  NODE_VERSION: 22.14.0
  TERM: xterm

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      track: ${{ steps.env.outputs.track }}
    steps:
      - name: ci/determine-environment
        id: env
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ -alpha\. ]]; then
            echo "environment=alpha" >> "$GITHUB_OUTPUT"
            echo "track=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ -beta\. ]]; then
            echo "environment=beta" >> "$GITHUB_OUTPUT"
            echo "track=internal" >> "$GITHUB_OUTPUT"
          fi
  test:
    runs-on: [self-hosted, macOS, Android]
    needs: determine-environment
    steps:
      - name: ci/checkout-repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: ci/test
        uses: ./.github/actions/test

  build-and-deploy:
    runs-on: [self-hosted, macOS, Android]
    needs:
      - determine-environment
      - test
    permissions:
      id-token: write
      contents: read
    steps:
      - name: ci/checkout-repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ci/compute-android-version
        id: version
        uses: ./.github/actions/compute-android-version

      - name: ci/prepare-android-build
        uses: ./.github/actions/prepare-android-build
        env:
          STORE_FILE: "${{ secrets.MM_MOBILE_STORE_FILE }}"
          STORE_ALIAS: "${{ secrets.MM_MOBILE_STORE_ALIAS }}"
          STORE_PASSWORD: "${{ secrets.MM_MOBILE_STORE_PASSWORD }}"
          MATTERMOST_BUILD_GH_TOKEN: "${{ secrets.MATTERMOST_BUILD_GH_TOKEN }}"

      - name: ci/update-android-version
        working-directory: ./fastlane
        env:
          ANDROID_VERSION_CODE: ${{ steps.version.outputs.version-code }}
          VERSION_NUMBER: ${{ steps.version.outputs.version-name }}
        run: |
          echo "Setting Android versionCode to $ANDROID_VERSION_CODE"
          echo "Setting Android versionName to $VERSION_NUMBER"
          bundle exec fastlane set_android_version_from_env

      - name: ci/build-and-deploy-android
        env:
          AWS_ACCESS_KEY_ID: "${{ secrets.MM_MOBILE_BETA_AWS_ACCESS_KEY_ID }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.MM_MOBILE_BETA_AWS_SECRET_ACCESS_KEY }}"
          MATTERMOST_WEBHOOK_URL: "${{ secrets.MM_MOBILE_BETA_MATTERMOST_WEBHOOK_URL }}"
          SENTRY_AUTH_TOKEN: "${{ secrets.MM_MOBILE_SENTRY_AUTH_TOKEN }}"
          SENTRY_DSN_ANDROID: ${{ secrets.MM_MOBILE_BETA_SENTRY_DSN_ANDROID }}
          SUPPLY_JSON_KEY: ${{ github.workspace }}/mobile-private/android/kchat-credentials.json
          SUPPLY_TRACK: ${{ needs.determine-environment.outputs.track }}
        run: |
          echo "::group::Build"
          bundle exec fastlane android build --env android.${{ needs.determine-environment.outputs.environment }}
          echo "::endgroup::"
          echo "::group::Deploy to Play Store (${{ needs.determine-environment.outputs.track }})"
          bundle exec fastlane android deploy file:"${{ github.workspace }}/*.aab" --env android.${{ needs.determine-environment.outputs.environment }}
          echo "::endgroup::"
        working-directory: ./fastlane

      - name: ci/upload-android-build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-build-${{ needs.determine-environment.outputs.environment }}-${{ github.run_id }}
          path: "*.apk"
